<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sous-titres Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 1.2em; font-weight: 600; color: #fff; }
        .header-actions { display: flex; gap: 8px; }

        /* --- UPLOAD VIEW --- */
        #view-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            padding: 24px;
        }

        .upload-zone {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 80px 60px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            max-width: 600px;
            width: 100%;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #646cff;
            background: #1a1a2e;
        }

        .upload-zone h2 { color: #fff; margin: 16px 0 8px; font-size: 1.4em; }
        .upload-zone p { color: #888; font-size: .9em; }
        .upload-icon { font-size: 3em; }
        #fileInput { display: none; }

        /* --- PROCESSING VIEW --- */
        #view-processing {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid #333;
            border-top-color: #646cff;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-text { color: #aaa; font-size: 1.1em; }

        /* --- EDITOR VIEW --- */
        #view-editor {
            display: none;
            height: calc(100vh - 60px);
        }

        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            height: 100%;
        }

        /* Subtitle list panel */
        .subs-panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2a;
            overflow: hidden;
        }

        .subs-toolbar {
            padding: 12px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subs-toolbar span { font-size: .85em; color: #888; }

        .subs-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .sub-item {
            display: grid;
            grid-template-columns: 70px 1fr 70px 32px;
            gap: 8px;
            align-items: center;
            padding: 6px 8px;
            border-radius: 8px;
            transition: background .15s;
        }

        .sub-item:hover { background: #1a1a1a; }
        .sub-item.active { background: #1a1a2e; }

        .sub-item input[type="text"] {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: .9em;
            font-family: 'Montserrat', sans-serif;
            width: 100%;
        }

        .sub-item input[type="text"]:focus { outline: none; border-color: #646cff; }

        .time-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: .75em;
            font-family: monospace;
            width: 70px;
            text-align: center;
        }

        .time-input:focus { outline: none; border-color: #646cff; color: #fff; }

        .btn-delete-sub {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1em;
            padding: 4px;
            border-radius: 4px;
        }

        .btn-delete-sub:hover { color: #ff4444; background: #2a1a1a; }

        /* Preview panel */
        .preview-panel {
            display: flex;
            flex-direction: column;
            background: #111;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            min-height: 0;
        }

        .video-container video {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }

        .subtitle-preview {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1em;
            color: #ffd700;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,.7);
            text-align: center;
            pointer-events: none;
            padding: 0 20px;
        }

        .preview-actions {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #2a2a2a;
        }

        /* Progress bar */
        .progress-bar-container {
            display: none;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            height: 36px;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #646cff, #8b5cf6);
            transition: width .3s;
            width: 0%;
        }

        .progress-bar-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85em;
            font-weight: 600;
            color: #fff;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: .9em;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            font-family: 'Inter', sans-serif;
        }

        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-primary { background: #646cff; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #535bf2; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover:not(:disabled) { background: #16a34a; }
        .btn-outline { background: transparent; color: #aaa; border: 1px solid #333; }
        .btn-outline:hover:not(:disabled) { border-color: #646cff; color: #646cff; }
        .btn-sm { padding: 6px 12px; font-size: .8em; }

        /* --- LIBRARY VIEW --- */
        #view-library {
            display: none;
            padding: 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        .library-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .library-header h2 { color: #fff; font-size: 1.2em; }

        .video-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            transition: border-color .15s;
        }

        .video-card:hover { border-color: #444; }

        .video-card-info h3 {
            color: #fff;
            font-size: .95em;
            font-weight: 500;
            margin-bottom: 6px;
            word-break: break-all;
        }

        .video-card-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .video-card-meta span {
            font-size: .8em;
            color: #888;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: .7em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-transcribed { background: #1e3a5f; color: #60a5fa; }
        .badge-generated { background: #14532d; color: #4ade80; }
        .badge-pending { background: #3f3f46; color: #a1a1aa; }
        .badge-processing { background: #4c1d95; color: #a78bfa; }

        .video-card-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-icon {
            background: none;
            border: 1px solid #333;
            color: #aaa;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: .8em;
            font-weight: 500;
            transition: all .15s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .btn-icon:hover { border-color: #646cff; color: #646cff; }
        .btn-icon.danger:hover { border-color: #ef4444; color: #ef4444; }

        .library-empty {
            text-align: center;
            color: #666;
            padding: 60px 20px;
            font-size: .95em;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #dc2626;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: .9em;
            z-index: 100;
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* Mobile */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .header h1 { font-size: 1em; }

            .upload-zone { padding: 50px 24px; }
            .upload-zone h2 { font-size: 1.2em; }
            .upload-icon { font-size: 2.4em; }

            #view-editor { height: auto; min-height: calc(100vh - 52px); }

            .editor-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                height: auto;
                min-height: calc(100vh - 52px);
            }

            .preview-panel { order: 1; }

            .video-container {
                padding: 8px;
                min-height: 220px;
                max-height: 280px;
            }

            .preview-actions { padding: 10px 12px; gap: 6px; }

            .subs-panel {
                order: 2;
                border-right: none;
                border-top: 1px solid #2a2a2a;
                max-height: 50vh;
                min-height: 200px;
            }

            .subs-toolbar { padding: 8px 12px; }

            .sub-item {
                grid-template-columns: 54px 1fr 54px 28px;
                gap: 4px;
                padding: 5px 4px;
            }

            .sub-item input[type="text"] {
                font-size: .8em;
                padding: 5px 6px;
            }

            .time-input {
                width: 54px;
                font-size: .65em;
                padding: 4px 2px;
            }

            .btn { padding: 10px 16px; font-size: .85em; }
            .btn-sm { padding: 5px 10px; font-size: .75em; }

            .subtitle-preview { font-size: .9em; bottom: 30px; }

            .progress-bar-container { height: 32px; }

            .processing-text { font-size: 1em; padding: 0 20px; text-align: center; }

            #view-library { padding: 16px; }

            .video-card {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .video-card-actions { justify-content: flex-start; }
        }

        /* Small phones */
        @media (max-width: 380px) {
            .sub-item {
                grid-template-columns: 46px 1fr 46px 24px;
                gap: 3px;
            }

            .time-input { width: 46px; font-size: .6em; }

            .video-container { max-height: 220px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Sous-titres Creator</h1>
    <div class="header-actions">
        <button class="btn btn-sm btn-outline" id="btnLibrary" onclick="showLibrary()">Mes vidéos</button>
    </div>
</div>

<!-- UPLOAD -->
<div id="view-upload">
    <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">🎬</div>
        <h2>Dépose ta vidéo ici</h2>
        <p>ou clique pour parcourir — MP4, MOV, AVI, WebM</p>
        <input type="file" id="fileInput" accept="video/*">
    </div>
</div>

<!-- PROCESSING -->
<div id="view-processing">
    <div class="spinner"></div>
    <div class="processing-text" id="processingText">Transcription en cours...</div>
</div>

<!-- EDITOR -->
<div id="view-editor">
    <div class="editor-layout">
        <div class="subs-panel">
            <div class="subs-toolbar">
                <span id="subCount">0 mots</span>
                <div style="display:flex;gap:6px;">
                    <button class="btn btn-sm btn-outline" onclick="addSubtitle()">+ Ajouter</button>
                    <button class="btn btn-sm btn-outline" onclick="resetSubtitles()">Réinitialiser</button>
                </div>
            </div>
            <div class="subs-list" id="subsList"></div>
        </div>

        <div class="preview-panel">
            <div class="video-container">
                <video id="videoPlayer" controls></video>
                <div class="subtitle-preview" id="subtitlePreview"></div>
            </div>
            <div class="preview-actions">
                <button class="btn btn-primary" id="btnGenerate" onclick="generateVideo()">
                    Générer la vidéo sous-titrée
                </button>
                <div class="progress-bar-container" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                    <div class="progress-bar-text" id="progressText">0%</div>
                </div>
                <button class="btn btn-success" id="btnDownload" style="display:none" onclick="downloadVideo()">
                    Télécharger la vidéo
                </button>
                <button class="btn btn-outline" onclick="resetAll()">Nouvelle vidéo</button>
            </div>
        </div>
    </div>
</div>

<!-- LIBRARY -->
<div id="view-library">
    <div class="library-header">
        <h2>Mes vidéos</h2>
        <button class="btn btn-sm btn-outline" onclick="showView('upload')">+ Nouvelle vidéo</button>
    </div>
    <div id="libraryList"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

let fileId = null;
let subtitles = [];
let originalSubtitles = [];

// --- State persistence ---
function saveState() {
    if (!fileId) {
        localStorage.removeItem('sc_state');
        return;
    }
    localStorage.setItem('sc_state', JSON.stringify({
        fileId,
        subtitles,
        originalSubtitles,
        timestamp: Date.now(),
    }));
}

async function restoreState() {
    const raw = localStorage.getItem('sc_state');
    if (!raw) return;

    try {
        const state = JSON.parse(raw);
        // Expire after 24h
        if (Date.now() - state.timestamp > 24 * 60 * 60 * 1000) {
            localStorage.removeItem('sc_state');
            return;
        }

        // Check if session still exists on server
        const res = await fetch(`/api/session/${state.fileId}`);
        if (!res.ok) {
            localStorage.removeItem('sc_state');
            return;
        }

        const session = await res.json();
        fileId = state.fileId;

        // If transcription is still running, show processing view and poll
        if (session.job_status === 'transcribing') {
            showView('processing');
            $('processingText').textContent = 'Transcription en cours...';
            pollTranscription(fileId);
            return;
        }

        // If encoding is in progress, restore editor + poll generate
        if (session.job_status === 'encoding') {
            subtitles = state.subtitles || session.subtitles || [];
            originalSubtitles = state.originalSubtitles || JSON.parse(JSON.stringify(subtitles));
            $('videoPlayer').src = `/api/video/${fileId}`;
            showView('editor');
            renderSubtitles();
            startSubtitleSync();
            // Resume polling generate progress
            const btn = $('btnGenerate');
            const bar = $('progressBar');
            const fill = $('progressFill');
            const text = $('progressText');
            btn.disabled = true;
            btn.style.display = 'none';
            bar.style.display = 'block';
            pollProgress(fileId, btn, bar, fill, text);
            return;
        }

        // Session has subtitles — restore editor
        if (session.transcribed && session.subtitles) {
            subtitles = state.subtitles || session.subtitles;
            originalSubtitles = state.originalSubtitles || JSON.parse(JSON.stringify(session.subtitles));
            $('videoPlayer').src = `/api/video/${fileId}`;
            showView('editor');
            renderSubtitles();
            startSubtitleSync();

            // If video was already generated, show download
            if (session.generated) {
                $('btnDownload').style.display = 'block';
                $('btnGenerate').textContent = 'Régénérer la vidéo';
                $('progressBar').style.display = 'block';
                $('progressFill').style.width = '100%';
                $('progressText').textContent = `Terminé (${session.size_mb} MB)`;
            }
            return;
        }
    } catch (e) {
        console.warn('Failed to restore state:', e);
        localStorage.removeItem('sc_state');
    }
}

// --- Upload ---
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

async function handleFile(file) {
    if (!file.type.startsWith('video/')) return showToast('Fichier vidéo requis');

    showView('processing');
    $('processingText').textContent = `Upload de ${(file.size / 1048576).toFixed(1)} MB...`;

    const form = new FormData();
    form.append('file', file);

    try {
        const res = await fetch('/api/upload', { method: 'POST', body: form });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `Erreur ${res.status}`);
        }

        const data = await res.json();
        fileId = data.file_id;
        saveState();

        $('processingText').textContent = 'Transcription en cours...';
        pollTranscription(fileId);

    } catch (err) {
        showToast(err.message);
        showView('upload');
    }
}

function pollTranscription(id) {
    const poll = setInterval(async () => {
        try {
            const r = await fetch(`/api/transcribe-progress/${id}`);
            if (!r.ok) return;
            const data = await r.json();

            if (data.error) {
                clearInterval(poll);
                showToast(data.error);
                showView('upload');
                return;
            }

            if (data.progress < 100) {
                $('processingText').textContent = `Transcription en cours... ${data.progress}%`;
                return;
            }

            // Done
            clearInterval(poll);
            subtitles = data.subtitles;
            originalSubtitles = JSON.parse(JSON.stringify(subtitles));
            saveState();

            $('videoPlayer').src = `/api/video/${fileId}`;
            showView('editor');
            renderSubtitles();
            startSubtitleSync();
        } catch (e) {
            // Network error — keep polling
        }
    }, 1000);
}

// --- Subtitle rendering ---
function renderSubtitles() {
    const list = $('subsList');
    list.innerHTML = '';
    $('subCount').textContent = `${subtitles.length} mots`;

    subtitles.forEach((sub, i) => {
        const div = document.createElement('div');
        div.className = 'sub-item';
        div.dataset.index = i;

        div.innerHTML = `
            <input type="text" class="time-input" value="${formatTime(sub.start)}"
                   onchange="updateTime(${i}, 'start', this.value)" title="Début">
            <input type="text" value="${escapeHtml(sub.text)}"
                   onchange="updateText(${i}, this.value)"
                   onfocus="seekTo(${sub.start})">
            <input type="text" class="time-input" value="${formatTime(sub.end)}"
                   onchange="updateTime(${i}, 'end', this.value)" title="Fin">
            <button class="btn-delete-sub" onclick="deleteSub(${i})" title="Supprimer">×</button>
        `;

        list.appendChild(div);
    });
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${s.toFixed(2).padStart(5, '0')}`;
}

function parseTime(str) {
    const parts = str.split(':');
    if (parts.length === 2) return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
    if (parts.length === 3) return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
    return parseFloat(str) || 0;
}

function updateText(i, val) { subtitles[i].text = val; hideDownload(); saveState(); }
function updateTime(i, field, val) { subtitles[i][field] = parseTime(val); hideDownload(); saveState(); }

function deleteSub(i) {
    subtitles.splice(i, 1);
    renderSubtitles();
    hideDownload();
    saveState();
}

function addSubtitle() {
    const video = $('videoPlayer');
    const t = video.currentTime || 0;
    const newSub = { text: 'nouveau', start: round3(t), end: round3(t + 0.5) };

    const idx = subtitles.findIndex(s => s.start > t);
    if (idx === -1) subtitles.push(newSub);
    else subtitles.splice(idx, 0, newSub);

    renderSubtitles();
    hideDownload();
    saveState();

    const items = $('subsList').querySelectorAll('.sub-item');
    const target = idx === -1 ? items[items.length - 1] : items[idx];
    if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.querySelector('input[type="text"]:not(.time-input)').focus();
    }
}

function resetSubtitles() {
    subtitles = JSON.parse(JSON.stringify(originalSubtitles));
    renderSubtitles();
    hideDownload();
    saveState();
}

function seekTo(time) { $('videoPlayer').currentTime = time; }
function round3(n) { return Math.round(n * 1000) / 1000; }

// --- Live subtitle preview ---
let syncInterval = null;

function startSubtitleSync() {
    if (syncInterval) clearInterval(syncInterval);
    const video = $('videoPlayer');
    const preview = $('subtitlePreview');

    syncInterval = setInterval(() => {
        if (video.paused && !video.seeking) return;
        const t = video.currentTime;
        const current = subtitles.find(s => t >= s.start && t <= s.end);
        preview.textContent = current ? current.text.toUpperCase() : '';

        document.querySelectorAll('.sub-item').forEach(el => {
            const i = parseInt(el.dataset.index);
            el.classList.toggle('active', subtitles[i] && t >= subtitles[i].start && t <= subtitles[i].end);
        });
    }, 50);
}

// --- Generate with background polling ---
async function generateVideo() {
    const btn = $('btnGenerate');
    const bar = $('progressBar');
    const fill = $('progressFill');
    const text = $('progressText');

    btn.disabled = true;
    btn.style.display = 'none';
    bar.style.display = 'block';
    fill.style.width = '0%';
    text.textContent = 'Démarrage...';
    hideDownload();

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_id: fileId, subtitles }),
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `Erreur ${res.status}`);
        }

        pollProgress(fileId, btn, bar, fill, text);

    } catch (err) {
        showToast(err.message);
        resetGenerateUI(btn, fill, text);
    }
}

function pollProgress(id, btn, bar, fill, text) {
    const poll = setInterval(async () => {
        try {
            const r = await fetch(`/api/progress/${id}`);
            if (!r.ok) return; // job not ready yet or already cleaned up
            const data = await r.json();

            if (data.error) {
                clearInterval(poll);
                showToast(data.error);
                resetGenerateUI(btn, fill, text);
                return;
            }

            fill.style.width = data.progress + '%';
            text.textContent = data.progress < 100
                ? `Encodage... ${data.progress}%`
                : `Terminé (${data.size_mb} MB)`;

            if (data.status === 'done') {
                clearInterval(poll);
                $('btnDownload').style.display = 'block';
                btn.textContent = 'Régénérer la vidéo';
                btn.disabled = false;
                btn.style.display = 'block';
            }
        } catch (e) {
            // Network error — keep polling, don't break
        }
    }, 1000);
}

function resetGenerateUI(btn, fill, text) {
    fill.style.width = '0%';
    text.textContent = 'Erreur';
    btn.textContent = 'Générer la vidéo sous-titrée';
    btn.disabled = false;
    btn.style.display = 'block';
}

function downloadVideo() {
    window.location.href = `/api/download/${fileId}`;
}

function hideDownload() {
    $('btnDownload').style.display = 'none';
    $('progressBar').style.display = 'none';
    $('btnGenerate').textContent = 'Générer la vidéo sous-titrée';
    $('btnGenerate').style.display = 'block';
}

// --- Navigation ---
function showView(name) {
    $('view-upload').style.display = name === 'upload' ? 'flex' : 'none';
    $('view-processing').style.display = name === 'processing' ? 'flex' : 'none';
    $('view-editor').style.display = name === 'editor' ? 'block' : 'none';
    $('view-library').style.display = name === 'library' ? 'block' : 'none';
}

function resetAll() {
    if (fileId) fetch(`/api/cleanup/${fileId}`, { method: 'DELETE' }).catch(() => {});
    fileId = null;
    subtitles = [];
    originalSubtitles = [];
    localStorage.removeItem('sc_state');
    $('videoPlayer').src = '';
    $('subtitlePreview').textContent = '';
    $('btnDownload').style.display = 'none';
    $('progressBar').style.display = 'none';
    $('btnGenerate').textContent = 'Générer la vidéo sous-titrée';
    $('btnGenerate').disabled = false;
    $('btnGenerate').style.display = 'block';
    fileInput.value = '';
    if (syncInterval) clearInterval(syncInterval);
    showView('upload');
}

// --- Library ---
async function showLibrary() {
    showView('library');
    $('libraryList').innerHTML = '<div class="library-empty">Chargement...</div>';

    try {
        const res = await fetch('/api/videos');
        if (!res.ok) throw new Error('Erreur chargement');
        const data = await res.json();

        if (!data.videos.length) {
            $('libraryList').innerHTML = '<div class="library-empty">Aucune vidéo pour le moment</div>';
            return;
        }

        $('libraryList').innerHTML = data.videos.map(v => {
            const date = new Date(v.created * 1000);
            const dateStr = date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });

            let badges = '';
            if (v.job_status === 'transcribing' || v.job_status === 'encoding') {
                badges += `<span class="badge badge-processing">${v.job_status} ${v.job_progress || 0}%</span>`;
            } else if (v.generated) {
                badges += '<span class="badge badge-generated">Sous-titré</span>';
            } else if (v.transcribed) {
                badges += '<span class="badge badge-transcribed">Transcrit</span>';
            } else {
                badges += '<span class="badge badge-pending">Uploadé</span>';
            }

            let actions = '';
            if (v.transcribed) {
                actions += `<button class="btn-icon" onclick="openVideo('${v.file_id}')">Ouvrir</button>`;
            }
            if (v.generated) {
                actions += `<button class="btn-icon" onclick="window.location.href='/api/download/${v.file_id}'">Télécharger</button>`;
            }
            actions += `<button class="btn-icon danger" onclick="deleteVideo('${v.file_id}')">Supprimer</button>`;

            return `<div class="video-card" id="card-${v.file_id}">
                <div class="video-card-info">
                    <h3>${escapeHtml(v.filename)}</h3>
                    <div class="video-card-meta">
                        <span>${v.size_mb} MB</span>
                        <span>${dateStr}</span>
                        ${v.subtitle_count ? `<span>${v.subtitle_count} mots</span>` : ''}
                        ${v.output_size_mb ? `<span>Sortie: ${v.output_size_mb} MB</span>` : ''}
                        ${badges}
                    </div>
                </div>
                <div class="video-card-actions">${actions}</div>
            </div>`;
        }).join('');
    } catch (e) {
        $('libraryList').innerHTML = '<div class="library-empty">Erreur de chargement</div>';
    }
}

async function openVideo(id) {
    try {
        const res = await fetch(`/api/session/${id}`);
        if (!res.ok) throw new Error('Session introuvable');
        const session = await res.json();

        fileId = id;
        subtitles = session.subtitles || [];
        originalSubtitles = JSON.parse(JSON.stringify(subtitles));
        saveState();

        $('videoPlayer').src = `/api/video/${fileId}`;
        showView('editor');
        renderSubtitles();
        startSubtitleSync();

        if (session.generated) {
            $('btnDownload').style.display = 'block';
            $('btnGenerate').textContent = 'Régénérer la vidéo';
            $('progressBar').style.display = 'block';
            $('progressFill').style.width = '100%';
            $('progressText').textContent = `Terminé (${session.size_mb} MB)`;
        }
    } catch (e) {
        showToast(e.message);
    }
}

async function deleteVideo(id) {
    if (!confirm('Supprimer cette vidéo et tous ses fichiers ?')) return;

    try {
        await fetch(`/api/cleanup/${id}`, { method: 'DELETE' });
        const card = document.getElementById(`card-${id}`);
        if (card) card.remove();
        // If we just deleted the current session, clear state
        if (fileId === id) {
            fileId = null;
            subtitles = [];
            originalSubtitles = [];
            localStorage.removeItem('sc_state');
        }
        // Check if list is now empty
        if (!$('libraryList').children.length) {
            $('libraryList').innerHTML = '<div class="library-empty">Aucune vidéo pour le moment</div>';
        }
    } catch (e) {
        showToast('Erreur lors de la suppression');
    }
}

// --- Restore state on page load ---
restoreState();

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 4000);
}
</script>
</body>
</html>
